name: Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign and publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Align and sign APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          echo "Using build-tools $BUILD_TOOLS"
          UNSIGNED=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "Unsigned APK: $UNSIGNED"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/release.keystore" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out OdinTools-ES.apk \
            aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify OdinTools-ES.apk
          echo "Signed APK ready: OdinTools-ES.apk"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" OdinTools-ES.apk \
            --title "OdinTools ES $TAG" \
            --notes "Version en espanol de OdinTools con el fix de saturacion. Descarga OdinTools-ES.apk e instalala en tu Odin 2."
